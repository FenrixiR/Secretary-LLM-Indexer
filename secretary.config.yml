# ── secretary.config.yml ──────────────────────────────────────────────────────
#
# Secretary configuration file.
# All settings here can be overridden by environment variables.
# Environment variables take precedence over this file.
#
# Copy this file to your secretary directory and edit as needed.
# ──────────────────────────────────────────────────────────────────────────────


# ── AI Model ──────────────────────────────────────────────────────────────────
# Any model available in your Ollama instance.
# Recommended: qwen2.5-coder:7b  (~5GB VRAM, good quality)
# Lighter:     qwen2.5-coder:3b  (~2GB VRAM, faster, lower quality)
# Pull with:   docker exec -it ollama ollama pull qwen2.5-coder:7b
ai_model: "qwen2.5-coder:7b"


# ── Ollama ────────────────────────────────────────────────────────────────────
# Host where Ollama is running.
# 172.17.0.1 is the Docker bridge — correct if Ollama runs as a sibling container.
# Use host.docker.internal on Mac/Windows, or the container name if on same network.
ollama_host: "http://172.17.0.1:11434"


# ── GPU Tuning ────────────────────────────────────────────────────────────────
# num_gpu: how many model layers to load onto GPU. 99 = as many as fit.
# Reduce if you hit out-of-memory errors (try 50 or 30).
# num_ctx: context window size. 4096 is good. Reduce to 2048 for speed.
num_gpu: 99
num_ctx: 4096


# ── WebSocket Protocol Extraction ─────────────────────────────────────────────
# Filenames (not paths) of the server and client files that contain
# WebSocket message dispatch logic. Secretary will extract message type
# strings from these files and produce PROTOCOL.md.
# Leave empty to disable protocol extraction.
ws_server_files:
  - "game.py"          # replace with your server's WS handler filename
ws_client_files:
  - "NetworkManager.gd"  # replace with your client's network handler filename


# ── Ignored Directories ───────────────────────────────────────────────────────
# Directory names (not paths) to skip during scanning.
# Applies anywhere in the tree — 'build' matches project/foo/build/ too.
# Add your own backup folders, archive folders, etc. here.
ignore_dirs:
  - ".git"
  - ".godot"
  - "__pycache__"
  - "node_modules"
  - "venv"
  - "build"
  - "dist"
  # Add project-specific ignored folders below:
  # - "Archive"
  # - "backup_old"


# ── Ignored File Extensions ───────────────────────────────────────────────────
# File extensions to skip entirely — no tree entry, no summary.
# Useful for build artefacts and editor cache files.
ignore_extensions:
  - ".pyc"
  - ".uid"       # Godot resource UIDs
  - ".import"    # Godot import cache


# ── Flag Annotations ──────────────────────────────────────────────────────────
# The flag keywords Secretary scans for in comments.
# Format in code:  # KEYWORD message   or   # KEYWORD: message
# These are the defaults — edit labels and severity ranks as you like.
# severity: lower number = shown first in ISSUES.md
flags:
  FIXME:  { label: "🔴 FIXME",  severity: 1 }
  STUB:   { label: "🟡 STUB",   severity: 2 }
  SYNC:   { label: "🔵 SYNC",   severity: 3 }
  DEBT:   { label: "🟠 DEBT",   severity: 4 }
  TODO:   { label: "⬜ TODO",   severity: 5 }
  CLAUDE: { label: "🤖 CLAUDE", severity: 6 }
